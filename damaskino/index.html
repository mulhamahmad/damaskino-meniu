<!DOCTYPE html>

<head>

    <title>Damaskino - Meniu Principal</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #fdf8f1;
            margin: 0;
            padding: 20px;
            color: #5d4037;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
        }

        .main-title {
            font-size: 28px;
            color: #b88e4f;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .menu-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .category-link {
            text-decoration: none;
            color: inherit;
        }

        .category-card {
            width: 145px;
            background: #fff;
            border: 1px solid #e2d1b5;
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(184, 142, 79, 0.1);
            transition: all 0.3s ease;
        }

        .category-card:hover {
            transform: translateY(-8px);
            border-color: #b88e4f;
            box-shadow: 0 8px 20px rgba(184, 142, 79, 0.25);
        }

        .category-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .category-card h4 {
            margin: 5px 0;
            font-size: 1em;
            font-weight: 600;
        }

        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #b88e4f, transparent);
            margin: 20px 0 30px;
        }

        /* Footer styling */
        footer {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 30px;
            border-top: 1px dashed #e2d1b5;
            padding-top: 20px;
        }

        .designer-info {
            color: #b88e4f;
            font-size: 0.85em;
            margin-top: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
